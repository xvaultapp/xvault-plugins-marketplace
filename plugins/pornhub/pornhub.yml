# PornHub — free-text search (Identify panel) + scene enrichment, no API key
# required. Clean-room: selectors derived 2026-07-09 from live curl fetches of
# https://www.pornhub.com/video/search?search=blonde (search results list,
# plain UA, NO age-gate/consent cookie needed — the server returned the full
# 38-result list identically with a browser UA, a bare `curl/8.x` UA, and no
# UA at all; no Cloudflare challenge observed on any of those fetches) and a
# video page reached from it (https://www.pornhub.com/view_video.php?viewkey=6a277342f0707).
#
# The video page carries a real schema.org VideoObject JSON-LD block (name/
# description/thumbnailUrl/uploadDate/duration) plus separate CSS blocks for
# the scoped performer list (div.pornstarsWrapper, NOT the sidebar/menu
# pornstar links elsewhere on the page, which include unrelated suggested
# performers) and categories/tags (div.categoriesWrapper).
#
# Known fragility: ~3 of every 38 search results are promoted/premium slots
# (data-entrycode="VidPg-premVid") whose title link href is literally
# "javascript:void(0)" instead of a real video URL — those rows will yield a
# garbage webpage_url and should be filtered/dropped downstream. Regular
# (non-premium) results are unaffected. PornHub is also known to vary its bot
# defenses by requester IP/geo/reputation; this plugin may need a browser UA
# or age-consent cookie in some deployments even though none was needed here.
name: PornHub
version: "1.0.1"
api_version: 1
url_patterns:
  - 'pornhub\.com/view_video\.php\?viewkey='
search:
  url: "https://www.pornhub.com/video/search?search={term}"
  selector: "li.videoblock"
  limit: 12
  fields:
    title:       { selector: "span.title a" }
    webpage_url: { selector: "span.title a", attribute: href }
    cover_url:   { selector: "div.phimage img", attribute: src }
    duration:    { selector: "var.duration" }
scene:
  # og:title, not json_ld `name`: PornHub HTML-encodes the JSON-LD name
  # ("Black &amp; white ... &excl;"), while og:title is already decoded
  # ("Black & white ... !") — verified live against the real host.
  title:       { selector: "meta[property='og:title']", type: css, attribute: content }
  description: { selector: description, type: json_ld }
  date:        { selector: uploadDate, type: json_ld }
  image:       { selector: thumbnailUrl, type: json_ld }
  performers:  { selector: "div.pornstarsWrapper a.pstar-list-btn", type: css, multiple: true }
  tags:        { selector: "div.categoriesWrapper a.item", type: css, multiple: true }

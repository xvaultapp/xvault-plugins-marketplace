# XVideos — free-text search (Identify panel) + scene enrichment, no API key
# required. Clean-room: selectors derived 2026-07-09 from live curl fetches of
# https://www.xvideos.com/?k=teen (search results grid, plain desktop-Chrome
# UA, no age-gate cookie needed — server returns full results HTML) and a
# video page reached from it (https://www.xvideos.com/video.uctvdcm9ee0/...).
#
# The video page carries a real schema.org VideoObject JSON-LD block
# (name/description/thumbnailUrl/uploadDate/duration) plus Open Graph meta
# tags (og:title/og:duration) and a video-metadata/video-tags-list block with
# uploader (studio), model (performer), and is-keyword (tag) anchors — scene
# fields below mix json_ld and css per what's cleanest/most reliable for each.
# Thumbs in the search grid are lazy-loaded via data-src (the src attribute
# is a shared blank placeholder gif).
name: XVideos
version: "1.0.0"
api_version: 1
url_patterns:
  - 'xvideos\.com/video\.'
search:
  url: "https://www.xvideos.com/?k={term}"
  selector: "div.thumb-block"
  limit: 12
  fields:
    title:       { selector: "p.title a", attribute: title }
    webpage_url: { selector: "p.title a", attribute: href }
    image:       { selector: ".thumb img", attribute: data-src }
    # no duration: the grid renders it as "13 min", and the host's search
    # parse_duration only accepts MM:SS/H:MM:SS — so the field would always
    # come back nil (verified live against the real host). Omitted rather
    # than shipped as a silent no-op.
scene:
  title:       { selector: "meta[property='og:title']", type: css, attribute: content }
  description: { selector: description, type: json_ld }
  date:        { selector: uploadDate, type: json_ld }
  # no scene duration: the host's declarative scene mapper (FIELD_KEYS) has no
  # duration key, so any scene duration: field is silently ignored (verified
  # live). Host-side GenericJsonLd still reads VideoObject.duration downstream.
  studio:      { selector: "li.main-uploader a.uploader-tag span.name", type: css }
  performers:  { selector: "li.model a.profile span.name", type: css, multiple: true }
  tags:        { selector: "div.video-tags-list a.is-keyword", type: css, multiple: true }
  image:       { selector: thumbnailUrl, type: json_ld }

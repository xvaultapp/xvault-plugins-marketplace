# Example XVault plugin — a template, not a real site.
#
# Demonstrates both capabilities:
#   search:  free-text search → XVault Identify connector (CSS-only fields)
#   scene:   scrape a matched webpage_url (css | xpath | json_ld fields)
#
# Field reference: docs/scraper-plugin-authoring.md in the XVault repo.
# Delete this file's contents and point the selectors at a real site to author
# your own — keep it clean-room (from the site's public HTML only).

name: Example Tube

# Ruby Regexp source strings; the first pattern that matches a scene's
# webpage_url selects this plugin for scraping.
url_patterns:
  - 'example-tube\.com/(video|scene)/'

# Optional. Makes the plugin searchable from the Identify panel. {term} is
# URL-encoded into the search URL. Sub-fields are CSS-only by design.
search:
  url: "https://example-tube.com/search?q={term}"
  selector: "article.video-card"      # one node per result
  limit: 12
  fields:
    title:
      selector: "a.title"
    webpage_url:
      selector: "a.title"
      attribute: href                 # relative URLs are resolved against the search URL
    image:
      selector: "img.thumb"
      attribute: src
    duration:                         # "MM:SS" / "H:MM:SS" → seconds
      selector: "span.duration"

# Optional. Scrapes the full scene page once a url_pattern matches.
scene:
  title:
    selector: "h1.scene-title"
    type: css
  description:
    selector: "//div[@id='scene-description']"
    type: xpath
  date:
    selector: "meta[property='video:release_date']"
    type: css
    attribute: content
    format: "%Y-%m-%d"                # Date.strptime format; omit to Date.parse
  studio:
    selector: "a.studio-name"
    type: css
  performers:
    selector: "div.performers a.performer-link"
    type: css
    multiple: true
  tags:
    selector: "div.tags a.tag"
    type: css
    multiple: true
  image:
    selector: thumbnailUrl            # schema.org VideoObject key
    type: json_ld

# Optional. Text mined for performer-name candidates (never auto-applied;
# cross-checked against known performers + TPDB, stored as suggestions).
comments:
  selector: "div.comment-list .comment-body"
  type: css
